<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simulación de un robot autómata de Starbucks animado puramente con CSS3 avanzado.">
    <title>Robot Automatizador | Portafolio</title>
    <link rel="stylesheet" href="robot.css">
</head>
<body>
 
    <main class="escenario">
        <h1>Simulación de Autómata de Procesos | Starbucks</h1>

        <article id="contenedor-robot">

            <div id="cuerpo-robot">

                <div id="cabeza">
                    <div class="ojo-izquierdo"></div>
                    <div class="ojo-derecho"></div>
                </div>

                <div id="torso">
                    <div id="pantalla-estado"></div>
                </div>

                <div id="extremidades">
                    <div class="brazo-izquierdo"></div>
                    <div class="brazo-derecho"></div>
                    <div class="pierna-izquierda"></div>
                    <div class="pierna-derecha"></div>
                </div>

            </div>

        </article>

        <p class="instrucciones">El autómata se encuentra ejecutando un ciclo de patrullaje y balanceo de extremidades.</p>
    </main>
    
</body>
</html>
